<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractal Engine</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/iosevka@5.3.3/index.css">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    

    <canvas id="minifractalCanvas" width="600" height="600"></canvas>

        <!-- Toggle Button -->
    <button id="menuToggle" class="minimal-btn">⚙ Controls & Info</button>
    
    <!-- Sliding Panel Drawer -->
    <div id="sideDrawer" class="drawer hidden">
        <div class="drawer-content">
            <!-- Info Section (Output) -->
            <section class="info-section">
                <h3 class="panel-title">Metrics</h3>
                <div class="info-grid">
                    <div>Fractal: <span id="infoName">-</span></div>
                    <div>Gen: <span id="infoGen">0</span></div>
                    <div>Elements: <span id="infoElements">0</span></div>
                </div>
            </section>

            <section class="history-section">
                <h3 class="panel-title">State</h3>
                <div class="action-row">
                    <button id="undoState" type="button">Undo</button>
                    <button id="redoState" type="button">Redo</button>
                    <button id="resetState" type="button">Reset</button>
                </div>
                <div class="action-row">
                    <button id="exportPng" type="button">Export PNG</button>
                    <button id="exportJson" type="button">Export JSON</button>
                </div>
                <div class="action-row">
                    <button id="mandelbrotZoomIn" type="button">Mandelbrot Zoom In</button>
                </div>
            </section>
        
            <hr class="panel-divider">
        
            <!-- Controls Section (Input) -->
            <section class="controls-section">
                <h3 class="panel-title">Tweak Parameters</h3>
                <div id="dynamicControls">
                    <!-- main.js will automatically inject sliders here -->
                </div>
            </section>
        </div>
    </div>

    <div class="main-container">

        

        <header class="site-header">
            <!-- <span class="eyebrow">recursion // iteration // infinity</span> -->
            <h1>Fractal Engine</h1>
            <p class="subtitle">Choose a structure below, then press Enter to go deeper</p>
        </header>
        
        <nav class="choose-visuals-nav">
          <div class="choose-visuals">
            <button class="visual" id="SierpinskiTriangle">Sierpinski Triangle</button>
            <button class="visual" id="SnowFlake">Snow Flake</button>
            <button class="visual" id="InfiniteCircles">Infinite Circles</button>
            <button class="visual" id="DragonCurve">Dragon Curve</button>
            <button class="visual" id="VicsekFractal">Vicsek Cross</button>
            <button class="visual" id="RecursiveTree">Fractal Tree</button>
            <button class="visual" id="Mandelbrot">Mandelbrot Set</button>
            <button class="visual" id="NewtonRaphson">Newton-Raphson</button>
            <button class="visual" id="BarnsleyFern">Barnsley Fern</button>
            <button class="visual" id="LSystemPlant">L-System Plant</button>
         </div>
        </nav>

        <div id="controlsHint" style="visibility: hidden;">
            Press <kbd>Enter</kbd> to advance generation
        </div>

        <canvas id="fractalCanvas" width="900" height="900"></canvas>

    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- <script type="module" src="./main.js"></script> -->
    <script type="module" src="./main.js?v=2.0"></script>
</body>
</html>

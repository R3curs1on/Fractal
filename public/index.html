<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="./style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractals</title>
</head>
<body>
    <div class="main-container">
        <h1>Welcome to Fractals</h1>
        <h2>Choose a fractal to visualize</h2>
        
        <div class="choose-visuals">
            <button id="SierpinskiTriangle">Sierpinski Triangle</button>
            <button id="SnowFlake">Snow Flake</button>
            <button id="InfiniteCircles">Infinite Circles</button>
        </div>

        <canvas id="fractalCanvas" width="1000" height="1000" style="background:#111; margin-top:20px;"></canvas>
    </div>
    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script type="module" src="./main.js"></script>
</body>
</html>

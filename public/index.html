<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fractal Engine</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/iosevka@5.3.3/index.css">
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div class="main-container">

        <header class="site-header">
            <!-- <span class="eyebrow">recursion // iteration // infinity</span> -->
            <h1>Fractal Engine</h1>
            <p class="subtitle">Choose a structure below, then press Enter to go deeper</p>
        </header>

        <nav class="choose-visuals">
          <div class="choose-visuals">
            <button id="SierpinskiTriangle">Sierpinski Triangle</button>
            <button id="SnowFlake">Snow Flake</button>
            <button id="InfiniteCircles">Infinite Circles</button>
            <button id="DragonCurve">Dragon Curve</button>
            <button id="VicsekFractal">Vicsek Cross</button>
            <button id="RecursiveTree">Fractal Tree</button>
            <button id="Mandelbrot">Mandelbrot Set</button>
    <button id="NewtonRaphson">Newton Fractal</button>
    <button id="BarnsleyFern">Barnsley Fern</button>
    <button id="LSystemPlant">L-System Plant</button>
         </div>
        </nav>

        <div id="controlsHint" style="visibility: hidden;">
            Press <kbd>Enter</kbd> to advance generation
        </div>

        <canvas id="fractalCanvas" width="900" height="900"></canvas>

    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- <script type="module" src="./main.js"></script> -->
    <script type="module" src="./main.js?v=2.0"></script>
</body>
</html>
